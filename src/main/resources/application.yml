spring:
  application:
    name: coovitel-cobranzas

 
  datasource:
    # rewriteBatchedStatements=true: convierte N batches en multi-row INSERT → throughput máximo
    url: ${DB_URL:jdbc:mysql://localhost:3306/coovitel?rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        database-platform: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        # Batch optimizations para JPA (saveAll en otros módulos)
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

  # Carga masiva: hasta 50MB por archivo CSV
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 52MB


app:
  security:
    jwt:
      secret: coovitel-cobranzas-dev-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256!!
      issuer: coovitel-cobranzas
      expiration-minutes: 480
    bootstrap:
      enabled: true
      admin-username: admin
      admin-password: Admin123!
      admin-full-name: System Administrator