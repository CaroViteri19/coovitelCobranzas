spring:
  application:
    name: coovitel-cobranzas

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coovitel}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  h2:
    console:
      enabled: false

app:
  security:
    jwt:
      secret: coovitel-cobranzas-dev-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256!!
      issuer: coovitel-cobranzas
      expiration-minutes: 480
    bootstrap:
      enabled: true
      admin-username: admin
      admin-password: Admin123!
      admin-full-name: System Administrator