spring:
  application:
    name: coovitel-cobranzas

  datasource:
    url: ${DB_URL:jdbc:h2:mem:coovitel;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
        use_sql_comments: true

  h2:
    console:
      enabled: false

app:
  security:
    jwt:
      secret: coovitel-cobranzas-dev-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256!!
      issuer: coovitel-cobranzas
      expiration-minutes: 480
    bootstrap:
      enabled: true
      admin-username: admin
      admin-password: Admin123!
      admin-full-name: System Administrator