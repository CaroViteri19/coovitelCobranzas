spring.application.name=coovitel-cobranzas

# ============================================
# JWT Configuration
# ============================================
security.jwt.secret=01234567890123456789012345678901234567890123456789012345678901
security.jwt.expiration-seconds=86400
security.jwt.refresh-expiration-seconds=604800

# ============================================
# OAuth2 Configuration
# ============================================
security.oauth2.enabled=true
security.oauth2.issuer-uri=http://localhost:8080
security.oauth2.jwk-set-uri=http://localhost:8080/oauth2/jwks

# ============================================
# Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/coovitelcobranzas?useSSL=false&serverTimezone=UTC
spring.datasource.username=mao
spring.datasource.password=mao123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.cooviteCobranza=DEBUG
logging.level.org.springframework.security=DEBUG

